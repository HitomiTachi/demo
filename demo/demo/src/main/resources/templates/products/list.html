<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Danh sách sản phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Danh sách sản phẩm</h2>
        <a class="btn btn-success" th:href="@{/products/add}">+ Thêm sản phẩm</a>
    </div>
    <div th:if="${success}" class="alert alert-success">[[${success}]]</div>
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>Giá</th>
                    <th>Hình ảnh</th>
                    <th>Loại</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${#numbers.formatInteger(product.price, 0, 'POINT')} + ' ₫'"></td>
                    <td>
                        <img th:if="${product.image}" th:src="@{'/images/' + ${product.image}}" alt="Ảnh sản phẩm" width="80" class="img-thumbnail" />
                    </td>
                    <td th:text="${product.category}"></td>
                    <td>
                        <a class="btn btn-sm btn-primary" th:href="@{'/products/edit/' + ${product.id}}">Sửa</a>
                        <a class="btn btn-sm btn-danger ms-1" th:href="@{'/products/delete/' + ${product.id}}" onclick="return confirm('Xác nhận xóa?')">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
